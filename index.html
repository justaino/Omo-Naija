<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Omo Naija — App Flow</title>

    <!-- Display webfont (Anton) — replaces the "Arial Black" fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet" />

    <!-- Styles, split out of the prototype's <style> block (look unchanged) -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/screens.css" />
    <link rel="stylesheet" href="css/animations.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-pill"><span class="brand-pill__mark">N</span> Omo Naija</div>
        <div class="topbar__right">
          <div class="step-pill" id="step-pill">1 / 7 Home</div>
          <button class="mute-btn" id="mute-btn" aria-label="Mute sound" aria-pressed="false">🔊</button>
        </div>
      </header>

      <!-- Seven screen shells. Each is filled by its js/screens/* module, driven
           by gameState.phase. Markup/classes are reproduced there to keep the
           look identical to the prototype. -->
      <main class="screen-stack">
        <section class="screen is-visible" id="home-screen"></section>
        <section class="screen" id="setup-screen"></section>
        <section class="screen" id="turn-screen"></section>
        <section class="screen" id="play-screen"></section>
        <section class="screen" id="summary-screen"></section>
        <section class="screen" id="scoreboard-screen"></section>
        <section class="screen" id="reveal-screen"></section>
      </main>
    </div>

    <!-- Animation / sound / confetti libs (CDN, UMD). Wired in Phase 2.
         Loaded before the app module so window globals exist when it runs. -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/Flip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
